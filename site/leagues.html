<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel2: #1c2330;
    --border: #2d3646;
    --text: #e6edf3;
    --muted: #8b96a5;
    --home: #3fb950;
    --draw: #d29922;
    --away: #58a6ff;
    --accent: #2ea043;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh; padding: 24px 16px;
  }
  .wrap { max-width: 880px; margin: 0 auto; }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 1.9rem; letter-spacing: -0.5px; }
  header h1 .ball { font-size: 1.6rem; }
  header p { color: var(--muted); margin-top: 6px; font-size: 0.95rem; }

  .controls {
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: grid; gap: 14px;
  }
  label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 5px; }
  select {
    width: 100%; padding: 10px 12px; border-radius: 8px;
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    font-size: 1rem; appearance: auto;
  }
  .teams-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: end; }
  .vs { padding-bottom: 10px; color: var(--muted); font-weight: 700; }
  .swap-btn {
    background: var(--panel2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 8px 10px; cursor: pointer; font-size: 0.9rem;
  }
  .swap-btn:hover { color: var(--text); border-color: var(--muted); }
  .controls-footer { display: flex; justify-content: space-between; align-items: center; }

  #result { margin-top: 24px; display: none; }
  .verdict {
    text-align: center; font-size: 1.25rem; margin-bottom: 18px;
    background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 18px;
  }
  .verdict strong { color: var(--accent); }
  .verdict .conf { display: block; font-size: 0.85rem; color: var(--muted); margin-top: 6px; }

  .prob-bar { display: flex; height: 46px; border-radius: 10px; overflow: hidden; font-weight: 700; font-size: 0.95rem; }
  .prob-bar > div { display: flex; align-items: center; justify-content: center; color: #0d1117; min-width: 0; white-space: nowrap; transition: width 0.5s ease; }
  .seg-h { background: var(--home); }
  .seg-d { background: var(--draw); }
  .seg-a { background: var(--away); }
  .prob-labels { display: flex; justify-content: space-between; margin-top: 8px; font-size: 0.85rem; color: var(--muted); }
  .prob-labels .lh { color: var(--home); } .prob-labels .ld { color: var(--draw); } .prob-labels .la { color: var(--away); }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } .teams-row { grid-template-columns: 1fr; } .vs { display: none; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
  td, th { padding: 6px 4px; text-align: left; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  tr + tr td { border-top: 1px solid var(--border); }
  .form-pill { display: inline-block; width: 20px; height: 20px; line-height: 20px; text-align: center; border-radius: 5px; font-size: 0.7rem; font-weight: 700; margin-right: 2px; color: #0d1117; }
  .form-W { background: var(--home); } .form-D { background: var(--draw); } .form-L { background: #f85149; }
  .score-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 4px; font-size: 0.92rem; }
  .score-row + .score-row { border-top: 1px solid var(--border); }
  .score-row .mini-bar { height: 8px; border-radius: 4px; background: var(--away); margin: 0 10px; flex: 1; max-width: 50%; }
  .muted { color: var(--muted); }
  footer { margin-top: 28px; text-align: center; font-size: 0.8rem; color: var(--muted); line-height: 1.6; }
  footer .accuracy { color: var(--text); }

<body>
<div class="wrap">
  <header>
    <h1><span class="ball">⚽</span> Match Predictor</h1>
    <p>Win probability from 5 seasons of results — Elo ratings + Dixon-Coles Poisson model · <a href="/" style="color:#58a6ff;text-decoration:none">⚽ World Cup 2026 live predictor →</a></p>
  </header>

  <div class="controls">
    <div>
      <label for="league">League</label>
      <select id="league"></select>
    </div>
    <div class="teams-row">
      <div>
        <label for="home">Home team</label>
        <select id="home"></select>
      </div>
      <div class="vs">vs</div>
      <div>
        <label for="away">Away team</label>
        <select id="away"></select>
      </div>
    </div>
    <div class="controls-footer">
      <span class="muted" id="model-date"></span>
      <button class="swap-btn" id="swap" title="Swap home and away">⇄ Swap home/away</button>
    </div>
  </div>

  <div id="result">
    <div class="verdict" id="verdict"></div>
    <div class="prob-bar" id="prob-bar">
      <div class="seg-h" id="seg-h"></div>
      <div class="seg-d" id="seg-d"></div>
      <div class="seg-a" id="seg-a"></div>
    </div>
    <div class="prob-labels">
      <span class="lh" id="lab-h"></span>
      <span class="ld" id="lab-d"></span>
      <span class="la" id="lab-a"></span>
    </div>

    <div class="grid2">
      <div class="card">
        <h3>Team strength</h3>
        <table id="strength-table"></table>
      </div>
      <div class="card">
        <h3>Most likely scorelines</h3>
        <div id="scorelines"></div>
      </div>
      <div class="card">
        <h3>Expected goals</h3>
        <table id="xg-table"></table>
      </div>
      <div class="card">
        <h3>Recent head-to-head</h3>
        <div id="h2h"></div>
      </div>
    </div>
  </div>

  <footer id="footer"></footer>
</div>

<script>
let MODEL = null;

const $ = id => document.getElementById(id);

function poissonPmf(k, lam) {
  let f = 1;
  for (let i = 2; i <= k; i++) f *= i;
  return Math.exp(-lam) * Math.pow(lam, k) / f;
}

function dcTau(x, y, lh, la, rho) {
  if (x === 0 && y === 0) return 1 - lh * la * rho;
  if (x === 0 && y === 1) return 1 + lh * rho;
  if (x === 1 && y === 0) return 1 + la * rho;
  if (x === 1 && y === 1) return 1 - rho;
  return 1;
}

function predict(league, home, away) {
  const L = MODEL.leagues[league];
  const p = MODEL.params;
  const th = L.teams[home], ta = L.teams[away];
  let lh = L.home_adv * L.base * th.att * ta.dfn;
  let la = L.base * ta.att * th.dfn;
  const gap = (th.elo + p.elo_home_adv - ta.elo) / 400;
  const eloFactor = Math.pow(10, gap * p.elo_blend_exp);
  lh *= Math.sqrt(eloFactor);
  la /= Math.sqrt(eloFactor);

  const G = p.max_goals;
  let ph = 0, pd = 0, pa = 0;
  const grid = [];
  for (let x = 0; x <= G; x++) {
    const px = poissonPmf(x, lh);
    for (let y = 0; y <= G; y++) {
      const prob = px * poissonPmf(y, la) * dcTau(x, y, lh, la, p.dc_rho);
      grid.push({ x, y, prob });
      if (x > y) ph += prob; else if (x === y) pd += prob; else pa += prob;
    }
  }
  const s = ph + pd + pa;
  grid.forEach(g => g.prob /= s);
  grid.sort((a, b) => b.prob - a.prob);
  return { ph: ph / s, pd: pd / s, pa: pa / s, lh, la, grid };
}

function pct(x) { return (100 * x).toFixed(1) + '%'; }

function formPills(form) {
  return form.map(r => `<span class="form-pill form-${r}">${r}</span>`).join('');
}

function render() {
  const league = $('league').value;
  const home = $('home').value;
  const away = $('away').value;
  if (!home || !away || home === away) {
    $('result').style.display = 'none';
    if (home === away && home) {
      $('result').style.display = 'block';
      $('verdict').innerHTML = '<span class="muted">Pick two different teams.</span>';
      $('prob-bar').style.display = 'none';
      ['lab-h','lab-d','lab-a'].forEach(i => $(i).textContent = '');
      document.querySelectorAll('.grid2 .card').forEach(c => c.style.display = 'none');
    }
    return;
  }
  $('result').style.display = 'block';
  $('prob-bar').style.display = 'flex';
  document.querySelectorAll('.grid2 .card').forEach(c => c.style.display = 'block');

  const L = MODEL.leagues[league];
  const r = predict(league, home, away);

  // verdict
  const outcomes = [
    { p: r.ph, label: `<strong>${home}</strong> is more likely to win` },
    { p: r.pd, label: `A <strong>draw</strong> is the most likely outcome` },
    { p: r.pa, label: `<strong>${away}</strong> is more likely to win` },
  ];
  const best = outcomes.reduce((a, b) => b.p > a.p ? b : a);
  let confNote;
  if (best.p > 0.60) confNote = 'strong favourite';
  else if (best.p > 0.45) confNote = 'clear edge';
  else confNote = 'close match — low confidence';
  $('verdict').innerHTML = `${best.label}<span class="conf">${pct(best.p)} — ${confNote}</span>`;

  // probability bar
  $('seg-h').style.width = (r.ph * 100) + '%';
  $('seg-d').style.width = (r.pd * 100) + '%';
  $('seg-a').style.width = (r.pa * 100) + '%';
  $('seg-h').textContent = r.ph > 0.12 ? pct(r.ph) : '';
  $('seg-d').textContent = r.pd > 0.12 ? pct(r.pd) : '';
  $('seg-a').textContent = r.pa > 0.12 ? pct(r.pa) : '';
  $('lab-h').textContent = `${home} win ${pct(r.ph)}`;
  $('lab-d').textContent = `Draw ${pct(r.pd)}`;
  $('lab-a').textContent = `${away} win ${pct(r.pa)}`;

  // strength table
  const th = L.teams[home], ta = L.teams[away];
  $('strength-table').innerHTML = `
    <tr><th></th><th class="num">${home}</th><th class="num">${away}</th></tr>
    <tr><td class="muted">Elo rating</td><td class="num">${th.elo.toFixed(0)}</td><td class="num">${ta.elo.toFixed(0)}</td></tr>
    <tr><td class="muted">Attack</td><td class="num">${th.att.toFixed(2)}</td><td class="num">${ta.att.toFixed(2)}</td></tr>
    <tr><td class="muted">Defense*</td><td class="num">${th.dfn.toFixed(2)}</td><td class="num">${ta.dfn.toFixed(2)}</td></tr>
    <tr><td class="muted">Form (latest first)</td><td class="num">${formPills(th.form)}</td><td class="num">${formPills(ta.form)}</td></tr>
  `;

  // scorelines
  const top = r.grid.slice(0, 5);
  const maxP = top[0].prob;
  $('scorelines').innerHTML = top.map(g => `
    <div class="score-row">
      <span>${home} ${g.x} – ${g.y} ${away}</span>
      <span class="mini-bar" style="max-width:${(g.prob / maxP) * 45}%"></span>
      <span class="muted">${pct(g.prob)}</span>
    </div>`).join('');

  // xg
  $('xg-table').innerHTML = `
    <tr><td class="muted">${home} (home)</td><td class="num">${r.lh.toFixed(2)} goals expected</td></tr>
    <tr><td class="muted">${away} (away)</td><td class="num">${r.la.toFixed(2)} goals expected</td></tr>
    <tr><td class="muted">Both teams score</td><td class="num">${pct(btts(r))}</td></tr>
    <tr><td class="muted">Over 2.5 goals</td><td class="num">${pct(over25(r))}</td></tr>
  `;

  // h2h
  const key = [home, away].sort().join('|');
  const meetings = (L.h2h[key] || []).slice().reverse();
  $('h2h').innerHTML = meetings.length
    ? meetings.map(m => `
        <div class="score-row">
          <span class="muted">${m[0]}</span>
          <span>${m[1]} <strong>${m[2]} – ${m[3]}</strong> ${m[4]}</span>
        </div>`).join('')
    : '<p class="muted">No meetings in the dataset (last 5 seasons).</p>';
}

function btts(r) {
  return r.grid.filter(g => g.x > 0 && g.y > 0).reduce((s, g) => s + g.prob, 0);
}
function over25(r) {
  return r.grid.filter(g => g.x + g.y > 2.5).reduce((s, g) => s + g.prob, 0);
}

function fillTeams() {
  const league = $('league').value;
  const teams = Object.keys(MODEL.leagues[league].teams).sort();
  for (const id of ['home', 'away']) {
    const sel = $(id);
    sel.innerHTML = '<option value="">— select —</option>' +
      teams.map(t => `<option>${t}</option>`).join('');
  }
  // sensible defaults: two highest-Elo teams
  const byElo = teams.slice().sort((a, b) =>
    MODEL.leagues[league].teams[b].elo - MODEL.leagues[league].teams[a].elo);
  $('home').value = byElo[0];
  $('away').value = byElo[1];
  render();
}

async function init() {
  MODEL = await (await fetch('model.json')).json();
  const leagues = Object.keys(MODEL.leagues);
  $('league').innerHTML = leagues.map(l =>
    `<option value="${l}">${MODEL.leagues[l].name}</option>`).join('');
  $('model-date').textContent = `Model built ${MODEL.generated} · data: ${MODEL.source}`;

  const accs = Object.entries(MODEL.backtest)
    .map(([l, b]) => `${MODEL.leagues[l].name.split(' (')[0]} ${(b.accuracy * 100).toFixed(0)}%`)
    .join(' · ');
  $('footer').innerHTML =
    `<span class="accuracy">Backtest accuracy (held-out final season): ${accs}</span><br>` +
    `Football is inherently unpredictable — even bookmakers only call ~53% of results. ` +
    `*Defense: lower is better. For entertainment and research, not betting advice.`;

  $('league').addEventListener('change', fillTeams);
  $('home').addEventListener('change', render);
  $('away').addEventListener('change', render);
  $('swap').addEventListener('click', () => {
    const h = $('home').value;
    $('home').value = $('away').value;
    $('away').value = h;
    render();
  });
  fillTeams();
}

init();
</script>
</body>
</html>
